<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Salary Simulator</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #eef2f7;
  color: #111;
}

.container {
  max-width: 1000px;
  margin: 30px auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

h2 {
  margin-top: 0;
}

.row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}

label {
  font-size: 14px;
  font-weight: bold;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1d4ed8;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  overflow: hidden;
  border-radius: 10px;
}

th {
  background: #111827;
  color: white;
  padding: 10px;
  font-size: 14px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: center;
  font-size: 14px;
}

tr:nth-child(even) {
  background: #f9fafb;
}

tr:hover {
  background: #eef2ff;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <h2>Salary Simulator</h2>

  <div class="row">
    <div>
      <label>Start Grade</label><br>
      <input type="number" id="grade" min="1" max="20" value="11">
    </div>

    <div>
      <label>Years</label><br>
      <input type="number" id="years" min="1" max="60" value="30">
    </div>

    <div>
      <label>Married</label><br>
      <select id="married">
        <option value="true">Yes</option>
        <option value="false">No</option>
      </select>
    </div>

    <div>
      <label>Wait 15 → 16</label><br>
      <input type="number" id="wait15" value="5" min="0.5" step="0.5">
    </div>

    <div>
      <label>Wait 17 → 18</label><br>
      <input type="number" id="wait17" value="7" min="0.5" step="0.5">
    </div>

    <div style="align-self:end;">
      <button onclick="runSimulation()">Run Simulation</button>
    </div>
  </div>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Year</th>
        <th>Grade</th>
        <th>Base</th>
        <th>Gross</th>
        <th>Net Take Home Monthly Salary</th>
        <th>Yearly Cash Bonus</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

</div>

<script>

// =======================
// DATA
// =======================

const GRADES = {
  1:{base:140,max:267,single:683,married:807},
  2:{base:150,max:281,single:693,married:817},
  3:{base:164,max:309,single:707,married:831},
  4:{base:178,max:377,single:721,married:845},
  5:{base:193,max:399,single:853,married:977},
  6:{base:239,max:501,single:1005,married:1129},
  7:{base:270,max:573,single:1144,married:1268},
  8:{base:323,max:701,single:1309,married:1439},
  9:{base:389,max:856,single:1442,married:1578},
  10:{base:434,max:952,single:1480,married:1616},
  11:{base:504,max:1093,single:1641,married:1772},
  12:{base:620,max:1320,single:1835,married:1973},
  13:{base:829,max:1738,single:2118,married:2476},
  14:{base:1008,max:2079,single:2392,married:2755},
  15:{base:1265,max:2581,single:2716,married:3086},
  16:{base:1473,max:3000,single:3035,married:3435},
  17:{base:1741,max:3515,single:3303,married:3703},
  18:{base:2059,max:4105,single:3833,married:4183},
  19:{base:2376,max:4694,single:4250,married:4600},
  20:{base:2723,max:5338,single:4647,married:4975}
};

const ANNUAL = 0.07;
const RET = 0.14525;

// =======================
// LOGIC
// =======================

function cap(g,b){
  return Math.min(b, GRADES[g].max);
}

function allow(g,married){
  const r = GRADES[g];
  return (married ? r.married : r.single) - r.base;
}

function buildEvents(start, wait15, wait17){

  let events = [];
  let t = 1.5;
  let g = start;

  while(g < 15){
    events.push([t,g,g+1]);
    g++;
    t += 1.5;
  }

  if(g === 15){

    let enter15 = t - 1.5;

    let t16 = enter15 + wait15;
    events.push([t16,15,16]);

    let t17 = t16 + 1.5;
    events.push([t17,16,17]);

    let t18 = t17 + wait17;
    events.push([t18,17,18]);

    let t19 = t18 + 1.5;
    events.push([t19,18,19]);
  }

  return events;
}

function simulate(start, years, married, wait15, wait17){

  let grade = start;
  let base = GRADES[start].base;

  let events = buildEvents(start, wait15, wait17);
  let i = 0;

  let out = [];

  // =======================
  // YEAR 0
  // =======================

  let allowance0 = allow(grade, married);
  let gross0 = base + allowance0;

  let net0 = gross0 > 2500
    ? gross0 - 425
    : gross0 * (1 - RET);

  let bonus0 = base * 1.5;

  out.push(`
    <tr>
      <td>0</td>
      <td>${grade}</td>
      <td>${base.toFixed(2)}</td>
      <td>${gross0.toFixed(2)}</td>
      <td>${net0.toFixed(2)}</td>
      <td>${bonus0.toFixed(2)}</td>
    </tr>
  `);

  // =======================
  // YEARS 1+
  // =======================

  for(let y=1;y<=years;y++){

    base *= (1+ANNUAL);
    base = cap(grade, base);

    while(i < events.length && events[i][0] <= y){

      let [,from,to] = events[i];

      if(grade === from){
        let carry = base - GRADES[from].base;
        base = GRADES[to].base + carry;
        grade = to;
        base = cap(grade, base);
      }

      i++;
    }

    let allowance = allow(grade, married);
    let gross = base + allowance;

    let net = gross > 2500
      ? gross - 425
      : gross * (1 - RET);

    let bonus = base * 1.5;

    out.push(`
      <tr>
        <td>${y}</td>
        <td>${grade}</td>
        <td>${base.toFixed(2)}</td>
        <td>${gross.toFixed(2)}</td>
        <td>${net.toFixed(2)}</td>
        <td>${bonus.toFixed(2)}</td>
      </tr>
    `);
  }

  document.getElementById("tableBody").innerHTML = out.join("");
}

function runSimulation(){

  let start = +document.getElementById("grade").value;
  let years = +document.getElementById("years").value;
  let married = document.getElementById("married").value === "true";
  let wait15 = +document.getElementById("wait15").value;
  let wait17 = +document.getElementById("wait17").value;

  simulate(start, years, married, wait15, wait17);
}

</script>

</body>
</html>
